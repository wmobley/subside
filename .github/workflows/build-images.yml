name: Build SUBSIDE Tapis images

on:
  push:
    branches: [main]
    paths:
      - "subside_analysis/**"
      - "workflow_apps/h2i_lab/**"
      - "workflow_apps/werc/**"
      - ".dockerignore"
      - ".github/workflows/build-images.yml"
  pull_request:
    paths:
      - "subside_analysis/**"
      - "workflow_apps/h2i_lab/**"
      - "workflow_apps/werc/**"
      - ".dockerignore"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      push:
        description: "Push images to ghcr.io"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: h2i_lab
            image: subside-h2i-opera-analysis
            dockerfile: workflow_apps/h2i_lab/Dockerfile
          - name: werc
            image: subside-werc-opera-analysis
            dockerfile: workflow_apps/werc/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Decide whether to push
        id: push
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.push }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build${{ steps.push.outputs.value == 'true' && ' and push' || '' }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ steps.push.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
