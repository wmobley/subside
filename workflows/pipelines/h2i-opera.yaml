---
# Pipeline A: SUBSIDE H2I OPERA — discovery + download + preview only.
#
# Flow: discover → download-opera → publish
#
# Tapis Workflows JSON/YAML schema (v3) is still evolving — verify each field
# against the live tenant before registering:
#   https://tapis.readthedocs.io/en/latest/technical/workflows.html
#
# Pipeline-level args (frame_ids / aoi / start_date / end_date) are passed
# in at runPipeline time; tasks reference them via {{ args.<name> }}.

id: subside-h2i-opera
type: workflow
description: |
  Discovery + download + preview pipeline for OPERA DISP-S1 over an AOI.
  Pipeline A of two; companion pipeline subside-werc-opera adds the
  stack/reference/velocity/export stages on top.
owner: ${apiUserId}
group_id: subside-ops
tenant_id: portals

# Inputs the caller supplies when invoking the pipeline.
params:
  start_date:        {type: string, required: true}
  end_date:          {type: string, required: true}
  aoi_geojson_uri:   {type: string, required: true, description: "tapis:// URI to the AOI GeoJSON"}
  earthdata_netrc_uri: {type: string, required: false, description: "Optional tapis:// URI to a protected .netrc"}
  num_workers:       {type: integer, default: 4}
  min_overlap_percent: {type: number, default: 50.0}
  allocation:        {type: string, required: true, description: "TACC allocation to charge"}
  update_conda_env:  {type: string, default: "false"}

tasks:

  - id: discover
    type: tapis_job
    depends_on: []
    description: Fast frame + product discovery; fails the pipeline if no products.
    tapis_job_def:
      appId: subside-h2i-discover
      appVersion: "0.1.0"
      name: subside-discover-{{ args.start_date }}-{{ args.end_date }}
      fileInputs:
        - name: run-config
          sourceUrl: "{{ workflow.inline_files.run_config_uri }}"
        - name: aoi-geojson
          sourceUrl: "{{ args.aoi_geojson_uri }}"
        - name: earthdata-netrc
          sourceUrl: "{{ args.earthdata_netrc_uri }}"
      parameterSet:
        envVariables:
          - key: UPDATE_CONDA_ENV
            value: "{{ args.update_conda_env }}"
        schedulerOptions:
          - name: "TACC Allocation"
            arg: "{{ args.allocation }}"

  - id: download-opera
    type: tapis_job
    depends_on:
      - id: discover
    description: Heavy NetCDF download + crop + preview + archive.
    tapis_job_def:
      appId: subside-h2i-opera-analysis
      appVersion: "0.1.0"
      name: subside-download-opera-{{ args.start_date }}-{{ args.end_date }}
      fileInputs:
        - name: run-config
          sourceUrl: "{{ workflow.inline_files.run_config_uri }}"
        - name: aoi-geojson
          sourceUrl: "{{ args.aoi_geojson_uri }}"
        - name: earthdata-netrc
          sourceUrl: "{{ args.earthdata_netrc_uri }}"
      parameterSet:
        envVariables:
          - key: UPDATE_CONDA_ENV
            value: "{{ args.update_conda_env }}"
        schedulerOptions:
          - name: "TACC Allocation"
            arg: "{{ args.allocation }}"

  - id: publish
    type: function
    runtime: python3.11
    depends_on:
      - id: download-opera
    description: |
      Stdlib-only Python. Reads preflight-manifest.json + run-manifest.json from
      the download-opera archive and emits a unified subside-run-manifest.json the
      UI can consume.
    inputs:
      preflight_manifest_uri: "{{ tasks.discover.outputs.archive }}/output/preflight-manifest.json"
      run_manifest_uri:       "{{ tasks.download-opera.outputs.archive }}/output/run-manifest.json"
    code: |
      import json, os, urllib.request

      def _load(uri):
          if uri.startswith("tapis://"):
              # The function-task runtime is expected to expose a tapis-files
              # mount or a fetch helper; falling back to urllib for local tests.
              raise RuntimeError("Configure tapis-files fetch in your workflows runner.")
          with urllib.request.urlopen(uri) as f:
              return json.load(f)

      preflight = _load(os.environ["INPUTS_PREFLIGHT_MANIFEST_URI"])
      run_manifest = _load(os.environ["INPUTS_RUN_MANIFEST_URI"])

      unified = {
          "pipeline": "subside-h2i-opera",
          "schema_version": "v0",
          "frame_ids": preflight.get("frame_ids", []),
          "product_count": preflight.get("product_count", 0),
          "warnings": preflight.get("warnings", []) + run_manifest.get("warnings", []),
          "artifacts": run_manifest.get("artifacts", {}),
          "config": run_manifest.get("config", {}),
      }
      with open(os.environ["OUTPUT_DIR"] + "/subside-run-manifest.json", "w") as f:
          json.dump(unified, f, indent=2, sort_keys=True, default=str)
